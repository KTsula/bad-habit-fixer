name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npx tsc -b && npx vite build --base /bad-habit-fixer/app/

      - name: Assemble site
        run: |
          mkdir -p _site/app
          cp docs/index.html _site/
          cp docs/privacy.html _site/
          # Copy built web app (JS/CSS/HTML only, skip large mediapipe assets
          # since the browser version loads them from CDN)
          cp dist/index.html _site/app/
          cp -r dist/assets _site/app/
          # Copy sound files for the web version
          mkdir -p _site/app/sounds
          cp public/sounds/*.mp3 _site/app/sounds/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
