name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles msi'
            rust-targets: ''
          - platform: macos-latest
            args: '--bundles dmg --target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--bundles dmg --target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Download MediaPipe assets
        run: npm run mediapipe:fetch

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Bad Habit Fixer ${{ github.ref_name }}'
          releaseBody: |
            See the [full changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}).

            **Install:**
            - **Windows:** Download and run the `.msi` installer
            - **macOS (Apple Silicon):** Download the `_aarch64.dmg` file
            - **macOS (Intel):** Download the `_x64.dmg` file

            > Windows SmartScreen may warn about an unsigned app. Click "More info" → "Run anyway".
            > macOS Gatekeeper may block the app. Right-click → Open to bypass.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
